name: CI / CD

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

permissions:
  contents: write
  pull-requests: write
  issues: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    name: Run tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18.x]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test
        env:
          JWT_SECRET: ${{ secrets.JWT_SECRET || 'test_secret_key_sigaroute_2024' }}
          JWT_EXPIRES_IN: 24h
          NODE_ENV: test
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD || 'admin@123' }}
          USER_PASSWORD: ${{ secrets.USER_PASSWORD || 'user@123' }}

      - name: Upload Mocha test report
        uses: actions/upload-artifact@v4
        with:
          name: mocha-report
          path: mochawesome-report
          retention-days: 30

  publish-report:
    name: Publish test report
    needs: test
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download test report
        uses: actions/download-artifact@v4
        with:
          name: mocha-report
          path: mochawesome-report

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./mochawesome-report
          destination_dir: reports/${{ github.run_number }}

  pr-comment:
    name: Comment on PR
    needs: test
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Comment PR
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '✅ Test report generated successfully!\n\n📊 **Download the Mochawesome report:**\nGo to the [Actions tab](${context.payload.repository.html_url}/actions/runs/${context.runId}) and download the `mocha-report` artifact.'
            })

  verify-server:
    name: Verify remote server
    needs: test
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    env:
      SSH_HOST: ${{ secrets.SSH_HOST }}
      SSH_USERNAME: ${{ secrets.SSH_USERNAME }}
      SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
      SSH_PORT: ${{ secrets.SSH_PORT }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Verify remote server configuration
        if: ${{ env.SSH_HOST != '' && env.SSH_USERNAME != '' && env.SSH_PRIVATE_KEY != '' }}
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ env.SSH_HOST }}
          username: ${{ env.SSH_USERNAME }}
          key: ${{ env.SSH_PRIVATE_KEY }}
          port: ${{ env.SSH_PORT || 22 }}
          script: |
            echo "Verificando servidor remoto..."
            test -d /var/www/sigaroute || exit 1
            command -v git >/dev/null 2>&1 || exit 1
            command -v npm >/dev/null 2>&1 || exit 1
            command -v pm2 >/dev/null 2>&1 || exit 1
            echo "Servidor configurado corretamente."

      - name: Skip server verification if SSH secrets are missing
        if: ${{ env.SSH_HOST == '' || env.SSH_USERNAME == '' || env.SSH_PRIVATE_KEY == '' }}
        run: |
          echo "SSH deploy secrets are not configured."
          echo "Add SSH_HOST, SSH_USERNAME and SSH_PRIVATE_KEY to repository secrets to enable deployment."

  deploy:
    name: Deploy on push to main
    needs: verify-server
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    env:
      SSH_HOST: ${{ secrets.SSH_HOST }}
      SSH_USERNAME: ${{ secrets.SSH_USERNAME }}
      SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
      SSH_PORT: ${{ secrets.SSH_PORT }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 18.x

      - name: Prepare deployment environment
        run: npm ci --production

      - name: Deploy to remote server via SSH
        if: ${{ env.SSH_HOST != '' && env.SSH_USERNAME != '' && env.SSH_PRIVATE_KEY != '' }}
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ env.SSH_HOST }}
          username: ${{ env.SSH_USERNAME }}
          key: ${{ env.SSH_PRIVATE_KEY }}
          port: ${{ env.SSH_PORT || 22 }}
          script: |
            cd /var/www/sigaroute || exit 1
            git pull origin main || git pull origin master
            npm install --production
            npx pm2 restart sigaroute || npx pm2 start server.js --name sigaroute --update-env
